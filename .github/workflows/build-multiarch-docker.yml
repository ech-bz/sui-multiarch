name: Build multi-arch Docker images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g., commit SHA or version tag)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.event.inputs.tag }}

jobs:
  build-arm64:
    name: Build ${{ matrix.image }} (arm64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - sui-node
          - sui-tools
          - sui-indexer-alt
          - sui-indexer-alt-graphql
          - sui-checkpoint-blob-indexer
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          fetch-depth: 0

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }} (arm64)
        run: |
          docker build -f ./docker/${{ matrix.image }}/Dockerfile \
            --build-arg GIT_REVISION=${{ env.IMAGE_TAG }} \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%d') \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}-arm64 \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}-arm64

  create-manifests:
    name: Create manifest for ${{ matrix.image }}
    needs: [build-arm64]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        image:
          - sui-node
          - sui-tools
          - sui-indexer-alt
          - sui-indexer-alt-graphql
          - sui-checkpoint-blob-indexer
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest for ${{ matrix.image }}
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }} \
            mysten/${{ matrix.image }}:${{ env.IMAGE_TAG }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}-arm64
